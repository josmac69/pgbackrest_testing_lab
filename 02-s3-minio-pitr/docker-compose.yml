services:
  pg-primary:
    image: pgbackrest-lab-base
    container_name: pg-primary-s3
    environment:
      - NODE_TYPE=primary
    volumes:
      - ./pg-primary.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - pg-primary-s3-data:/var/lib/postgresql/16/main
    networks:
      - lab2-net
    depends_on:
      - minio-create-bucket

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_CERTS_DIR=/certs
    command: server /data --console-address ":9001" --certs-dir /certs
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
      - ./certs:/certs:ro
    networks:
      - lab2-net

  minio-create-bucket:
    image: minio/mc:latest
    container_name: minio-create-bucket
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc --insecure alias set myminio https://minio:9000 minioadmin minioadmin) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc --insecure mb myminio/pgbackrest || true;
      exit 0;
      "
    networks:
      - lab2-net

volumes:
  pg-primary-s3-data:
  minio-data:

networks:
  lab2-net:
    name: lab2-net
